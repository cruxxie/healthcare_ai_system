{% extends "base.html" %}
{% block title %}Register – ClinAI{% endblock %}
{% block page_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg,#1a3a5c 0%,#0d6efd 100%);">
  <div class="card shadow-lg border-0" style="width: 460px; border-radius: 16px; overflow:hidden;">
    <div class="card-header text-center py-4" style="background:#0d6efd;">
      <i class="bi bi-person-plus-fill text-white" style="font-size:2.5rem;"></i>
      <h4 class="text-white fw-bold mt-2 mb-0">Register User</h4>
      <small class="text-white-50">Create a new healthcare staff account</small>
    </div>
    <div class="card-body px-4 py-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" name="full_name" class="form-control form-control-lg" placeholder="Your full name" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control form-control-lg" placeholder="Choose a username" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email" required />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control form-control-lg" placeholder="Choose a password" required />
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
          <i class="bi bi-person-check-fill me-2"></i>Register
        </button>
      </form>
    </div>
    <div class="card-footer text-center py-3 bg-light">
      <small class="text-muted">Already have an account? <a href="{{ url_for('auth.user_login') }}">Login here</a></small>
    </div>
  </div>
</div>
{% endblock %}
