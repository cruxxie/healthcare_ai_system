{% extends "base.html" %}
{% block title %}Add Staff – ClinAI{% endblock %}
{% block breadcrumb %}Admin / Users / Add New{% endblock %}
{% block page_content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-bold py-3"><i class="bi bi-person-plus me-2 text-primary"></i>Register New Staff Account</div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name *</label>
              <input type="text" name="full_name" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Username *</label>
              <input type="text" name="username" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email *</label>
              <input type="email" name="email" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password *</label>
              <input type="password" name="password" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Profession</label>
              <select name="profession" class="form-select">
                <option value="">— Select —</option>
                <option>Physician / Doctor</option>
                <option>Nurse</option>
                <option>Medical Technologist</option>
                <option>Pharmacist</option>
                <option>Physical Therapist</option>
                <option>IT Expert</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" name="department" class="form-control" placeholder="e.g. Emergency, ICU" />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role *</label>
              <select name="role" class="form-select">
                <option value="user">Staff (User)</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-check2 me-1"></i>Create Account</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
